# ─── Font ───────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ─── Cursor ─────────────────────────────────────────────────────────────────
cursor                  #ffffff
cursor_text_color       #000000
cursor_shape            block
cursor_blink_interval   0

# ─── Window ─────────────────────────────────────────────────────────────────
window_padding_width    12
background_opacity      0.95
confirm_os_window_close 0
hide_window_decorations no

# ─── Scrollback ─────────────────────────────────────────────────────────────
scrollback_lines        10000

# ─── Tab Bar ────────────────────────────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"

# ─── Colors ──────────────────────────────────────────────────────────────────
# Terminal background/foreground: black & white
foreground              #e8e8e8
background              #0a0a0a
selection_foreground    #000000
selection_background    #e8e8e8

# ANSI colors kept vivid so fastfetch/apps stay colorful
# Black
color0  #1a1a1a
color8  #555555

# Red
color1  #ff5555
color9  #ff6e6e

# Green
color2  #50fa7b
color10 #69ff94

# Yellow
color3  #f1fa8c
color11 #ffffa5

# Blue
color4  #6272a4
color12 #8be9fd

# Magenta
color5  #ff79c6
color13 #ff92df

# Cyan
color6  #8be9fd
color14 #a4ffff

# White
color7  #e8e8e8
color15 #ffffff

# ─── URL ────────────────────────────────────────────────────────────────────
url_color               #aaaaaa
url_style               curly

# ─── Shell ──────────────────────────────────────────────────────────────────
shell                   zsh
editor                  nvim

# ─── Keybinds ───────────────────────────────────────────────────────────────
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+t        new_tab
map ctrl+shift+w        close_tab
map ctrl+shift+l        next_tab
map ctrl+shift+h        prev_tab
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+shift+r        load_config_file